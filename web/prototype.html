function Pin({ x, y, label, field, conf, delay = 0, accent }) {
  const [vis, setVis] = useState(false);
  useEffect(() => { const t = setTimeout(() => setVis(true), delay); return () => clearTimeout(t); }, [delay]);
  return (
    <div style={{ position: "absolute", left: `${x}%`, top: `${y}%`, transform: "translate(-50%, -50%)", opacity: vis ? 1 : 0, transition: `all 0.6s cubic-bezier(0.16,1,0.3,1) ${delay}ms`, zIndex: 10 }}>
      <div style={{ position: "absolute", inset: -8, borderRadius: "50%", border: `1px solid ${accent}`, opacity: 0.3, animation: "v5pulse 2s ease-in-out infinite" }}/>
      <div style={{ width: 10, height: 10, borderRadius: 5, background: accent, boxShadow: `0 0 20px ${accent}60` }}/>
      <div style={{ position: "absolute", left: 16, top: "50%", transform: "translateY(-50%)", whiteSpace: "nowrap", background: "rgba(0,0,0,0.7)", backdropFilter: "blur(10px)", padding: "4px 10px", borderRadius: 4, border: "1px solid rgba(255,255,255,0.08)", display: "flex", alignItems: "center", gap: 6 }}>
        <span style={{ fontSize: 9, color: "rgba(255,255,255,0.35)", fontFamily: mono, letterSpacing: "0.06em", textTransform: "uppercase" }}>{field}</span>
        <span style={{ fontSize: 11, color: "#fff", fontFamily: mono }}>{label}</span>
        <span style={{ fontSize: 8, fontFamily: mono, fontWeight: 600, padding: "1px 4px", borderRadius: 2, background: conf >= 90 ? "rgba(61,214,140,0.2)" : conf >= 75 ? `${accent}25` : "rgba(240,96,96,0.2)", color: conf >= 90 ? "#3DD68C" : conf >= 75 ? accent : "#F06060" }}>{conf}%</span>
      </div>
    </div>
  );
}

  useEffect(() => {
    const s = document.createElement("style");
    s.textContent = `@keyframes v5pulse{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.8);opacity:0}}@keyframes v5fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}`;
    document.head.appendChild(s);
    return () => document.head.removeChild(s);
  }, []);
  return null;
}

// ============================================================
// MAIN ROUTER
// ============================================================
function AhaRegisterV51() {
  const [screen, setScreen] = useState(SCREENS.SPLASH);
  const navigate = useCallback((target) => {
    if (target === "__RESTART__") { setScreen(SCREENS.SPLASH); return; }
    setScreen(target);
  }, []);

  const names = {
    [SCREENS.SPLASH]: "Splash", [SCREENS.ONBOARD_1]: "Onboard 1/3", [SCREENS.ONBOARD_2]: "Onboard 2/3", [SCREENS.ONBOARD_3]: "Onboard 3/3",
    [SCREENS.LOGIN]: "Sign In", [SCREENS.DOMAIN_SELECT]: "Field Select", [SCREENS.HOME]: "Home", [SCREENS.CAPTURE_CHOICE]: "Capture",
    [SCREENS.CAMERA]: "Camera", [SCREENS.CAMERA_MULTI]: "Multi-Angle", [SCREENS.CAMERA_3D]: "3D Scan", [SCREENS.CAMERA_BATCH]: "Batch",
    [SCREENS.AI_PROCESSING]: "Processing", [SCREENS.AI_RESULTS]: "✦ AI Annotations", [SCREENS.OBJECT_DETAIL]: "✦ Artwork",
    [SCREENS.OBJECT_PROVENANCE]: "✦ Provenance", [SCREENS.OBJECT_3D]: "✦ 3D Model", [SCREENS.INVENTORY]: "Inventory",
    [SCREENS.QR_SCANNER]: "Scanner", [SCREENS.QR_RESULT]: "QR Result", [SCREENS.QR_CREATE]: "Create QR",
    [SCREENS.LOCATIONS]: "Locations", [SCREENS.LOCATION_DETAIL]: "Location", [SCREENS.COLLECTIONS]: "Collections",
    [SCREENS.COLLECTION_DETAIL]: "Collection", [SCREENS.EXPORT]: "Export", [SCREENS.EXPORT_PREVIEW]: "Export Preview",
    [SCREENS.TEAM]: "Team", [SCREENS.SETTINGS]: "More", [SCREENS.PLAN]: "Plans",
    [SCREENS.PRIVACY_ONBOARD]: "Privacy", [SCREENS.DATA_PRIVACY]: "Data & Privacy", [SCREENS.ABOUT]: "About",
  };

  const S = SCREENS;
  const r = () => {
    switch (screen) {
      case S.SPLASH: return <SplashScreen onNavigate={navigate}/>;
      case S.ONBOARD_1: return <OnboardScreen step={1} onNavigate={navigate}/>;
      case S.ONBOARD_2: return <OnboardScreen step={2} onNavigate={navigate}/>;
      case S.ONBOARD_3: return <OnboardScreen step={3} onNavigate={navigate}/>;
      case S.PRIVACY_ONBOARD: return <PrivacyScreen onNavigate={navigate}/>;
      case S.LOGIN: return <LoginScreen onNavigate={navigate}/>;
      case S.DOMAIN_SELECT: return <DomainSelectScreen onNavigate={navigate}/>;
      case S.HOME: return <HomeScreen onNavigate={navigate}/>;
      case S.CAPTURE_CHOICE: return <CaptureChoiceScreen onNavigate={navigate}/>;
      case S.CAMERA: case S.CAMERA_MULTI: case S.CAMERA_3D: case S.CAMERA_BATCH:
        return <CameraScreen onNavigate={navigate} mode={screen === S.CAMERA ? "single" : screen === S.CAMERA_MULTI ? "multi" : screen === S.CAMERA_3D ? "3d" : "batch"}/>;
      case S.AI_PROCESSING: return <AIProcessingScreen onNavigate={navigate}/>;
      case S.AI_RESULTS: return <AIResultsScreen onNavigate={navigate}/>;
      case S.OBJECT_DETAIL: return <ObjectDetailScreen onNavigate={navigate}/>;
      case S.OBJECT_PROVENANCE: return <ProvenanceScreen onNavigate={navigate}/>;
      case S.OBJECT_3D: return <Object3DScreen onNavigate={navigate}/>;
      case S.INVENTORY: return <InventoryScreen onNavigate={navigate}/>;
      case S.QR_SCANNER: return <QRScannerScreen onNavigate={navigate}/>;
      case S.QR_RESULT: return <QRResultScreen onNavigate={navigate}/>;
      case S.QR_CREATE: return <QRCreateScreen onNavigate={navigate}/>;
      case S.LOCATIONS: return <LocationsScreen onNavigate={navigate}/>;
      case S.LOCATION_DETAIL: return <LocationDetailScreen onNavigate={navigate}/>;
      case S.COLLECTIONS: return <CollectionsScreen onNavigate={navigate}/>;
      case S.COLLECTION_DETAIL: return <CollectionDetailScreen onNavigate={navigate}/>;
      case S.EXPORT: return <ExportScreen onNavigate={navigate}/>;
      case S.EXPORT_PREVIEW: return <ExportPreviewScreen onNavigate={navigate}/>;
      case S.TEAM: return <TeamScreen onNavigate={navigate}/>;
      case S.SETTINGS: return <SettingsScreen onNavigate={navigate}/>;
      case S.PLAN: return <PlanScreen onNavigate={navigate}/>;
      case S.DATA_PRIVACY: return <DataPrivacyScreen onNavigate={navigate}/>;
      case S.ABOUT: return <AboutScreen onNavigate={navigate}/>;
      default: return <HomeScreen onNavigate={navigate}/>;
    }
  };

  return (
    <>
      <StyleInjector/>
      <PhoneFrame screenName={names[screen] || screen} onRestart={() => navigate("__RESTART__")}>{r()}</PhoneFrame>
    </>
  );
}

// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(AhaRegisterV51));
</script>
</body>
</html>
